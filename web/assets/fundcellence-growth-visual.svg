<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Fundcellence growth visual</title>
  <desc id="desc">A soft green finance illustration with a progress slider and rising chart lines.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20db80"/>
      <stop offset="1" stop-color="#11c96c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#cde6ff"/>
      <stop offset="1" stop-color="#7db9ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#316049" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="760" height="360" fill="none"/>

  <g filter="url(#softShadow)">
    <rect x="28" y="56" width="704" height="248" rx="36" fill="#f8fffb" stroke="#d9f0e3"/>
  </g>

  <g opacity="0.78">
    <rect x="64" y="118" width="304" height="150" rx="58" fill="#eaf8f0"/>
    <rect x="94" y="148" width="244" height="94" rx="42" fill="#ffffff" opacity="0.92"/>
    <rect x="205" y="150" width="30" height="92" rx="2" fill="url(#green)"/>
    <circle cx="220" cy="148" r="18" fill="#20db80"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="400" y="92" width="280" height="178" rx="34" fill="url(#panel)"/>
  </g>

  <g opacity="0.52" stroke="#d8e6de" stroke-width="1">
    <path d="M425 92V270"/>
    <path d="M485 92V270"/>
    <path d="M545 92V270"/>
    <path d="M605 92V270"/>
    <path d="M665 92V270"/>
    <path d="M400 138H680"/>
    <path d="M400 184H680"/>
    <path d="M400 230H680"/>
  </g>

  <path d="M400 236C454 186 500 146 548 92" fill="none" stroke="#20b96d" stroke-width="7" stroke-linecap="round"/>
  <path d="M400 236C474 195 562 154 680 112" fill="none" stroke="#89c4ff" stroke-width="7" stroke-linecap="round"/>
</svg>

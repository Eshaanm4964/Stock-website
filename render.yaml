services:
  - type: web
    name: stock-trader-demo-backend
    env: docker
    rootDir: backend-api
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: development
      - key: DEMO_MODE
        value: false
      - key: OTP_DEBUG_MODE
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin_dev
      - key: ADMIN_EMAIL
        value: admin@assetyantra.local
      - key: ADMIN_FULL_NAME
        value: AssetYantra Admin
      - key: ADMIN_PHONE_NUMBER
        value: 9392970534
      - key: FRONTEND_URL
        value: https://web-ruddy-eight-73.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://web-ruddy-eight-73.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SMS_PROVIDER
        value: 2factor
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        value: ASTYNT
      - key: SMS_TIMEOUT_SECONDS
        value: 10

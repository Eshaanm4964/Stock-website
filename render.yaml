services:
  - type: web
    name: stock-trader-demo-backend
    env: docker
    rootDir: backend-api
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: development
      - key: DEMO_MODE
        value: false
      - key: DEMO_OTP_ENABLED
        value: true
      - key: DEMO_OTP_CODE
        value: 123456
      - key: OTP_DEBUG_MODE
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_FULL_NAME
        sync: false
      - key: ADMIN_PHONE_NUMBER
        sync: false
      - key: ADMIN_ALLOWED_PHONE_NUMBERS
        sync: false
      - key: FRONTEND_URL
        value: https://www.assetyantra.com
      - key: ALLOWED_ORIGINS
        value: https://www.assetyantra.com,https://assetyantra.com,https://web-ruddy-eight-73.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SMS_PROVIDER
        value: 2factor
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        value: ASTYNT
      - key: SMS_TIMEOUT_SECONDS
        value: 10

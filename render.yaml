services:
  - type: web
    name: stock-trader-demo-backend
    env: python
    rootDir: backend-api
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: development
      - key: DEMO_MODE
        value: true
      - key: OTP_DEBUG_MODE
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://web-ruddy-eight-73.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://web-ruddy-eight-73.vercel.app
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./stock_trader.db
